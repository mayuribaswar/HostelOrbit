{% extends 'base.html' %}{% block content %}<section class="panel"><h3>Expense Tracking</h3><form method="post" class="grid-form"><input name="title" placeholder="Expense title" required><input name="category" placeholder="Category" required><input type="number" step="0.01" name="amount" placeholder="Amount" required><button class="btn">Add Expense</button></form><table><thead><tr><th>Title</th><th>Category</th><th>Amount</th><th>Date</th></tr></thead><tbody>{% for exp in expenses %}<tr><td>{{ exp.title }}</td><td>{{ exp.category }}</td><td>INR {{ exp.amount }}</td><td>{{ exp.spent_on }}</td></tr>{% endfor %}</tbody></table></section>{% endblock %}
