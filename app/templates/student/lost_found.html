{% extends 'base.html' %}{% block content %}<section class="panel"><h3>Lost & Found</h3><form method="post" class="grid-form"><input name="item_name" placeholder="Item name" required><input name="location" placeholder="Location" required><textarea name="description" placeholder="Description" required></textarea><button class="btn">Submit Entry</button></form><table><thead><tr><th>Item</th><th>Location</th><th>Status</th><th>Reporter</th></tr></thead><tbody>{% for i in items %}<tr><td>{{ i.item_name }}</td><td>{{ i.location }}</td><td><span class="badge">{{ i.status }}</span></td><td>{{ i.reporter.name }}</td></tr>{% endfor %}</tbody></table></section>{% endblock %}
