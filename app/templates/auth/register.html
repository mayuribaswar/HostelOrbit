{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
  <h1>Create account</h1>
  <p class="muted">Register as a student or rector/admin.</p>
  <form method="post" class="grid-form">
    <input name="name" placeholder="Full name" required>
    <input type="email" name="email" placeholder="Email address" required>
    <input type="password" name="password" minlength="6" placeholder="Password (min 6 chars)" required>
    <select name="role">
      <option value="student">Student</option>
      <option value="admin">Rector/Admin</option>
    </select>
    <input name="hostel_id" placeholder="Hostel ID" required>
    <input name="branch" placeholder="Branch (e.g. CSE)">
    <input type="number" name="year" min="1" max="6" value="1">
    <button type="submit" class="btn">Create Account</button>
  </form>
  <p>Already registered? <a href="{{ url_for('auth.login') }}">Login</a></p>
</div>
{% endblock %}
